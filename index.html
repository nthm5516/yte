<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DANH SÁCH UỐNG THUỐC</title>

<style>
body{font-family:Arial;background:#f5f6fa;padding:20px}
h2{text-align:center}

input,select,button{
  padding:8px;
  margin:5px;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th{
  background:#2e75b6;
  color:white;
  padding:10px;
}

td{
  border:1px solid #ccc;
  padding:5px;
  text-align:center;
}

button{cursor:pointer}
</style>
</head>

<body>

<h2>DANH SÁCH UỐNG THUỐC</h2>

<input id="hoten" placeholder="Họ tên">
<input id="namsinh" placeholder="Năm sinh">
<input id="nha" placeholder="Nhà">
<input id="thuoc" placeholder="Thuốc">
<input id="ngay" type="date">

<button onclick="them()">Thêm</button>
<button onclick="inDanhSach()">🖨 In</button>

<br>

<input id="tim" placeholder="🔍 Tìm tên..." oninput="render()">

<select id="locNha" onchange="render()">
  <option value="">🏠 Lọc theo nhà</option>
  <option>1</option><option>2</option><option>3</option>
  <option>4</option><option>5</option><option>6</option>
  <option>7</option><option>8</option><option>9</option>
</select>

<br><b>Chọn nhà để in:</b><br>
<div id="chonNha"></div>

<table>
<thead>
<tr>
<th>STT</th>
<th>Họ tên</th>
<th>Năm sinh</th>
<th>Nhà</th>
<th>Ngày tái khám</th>
<th>Thuốc</th>
<th>Sửa</th>
<th>Xóa</th>
</tr>
</thead>

<tbody id="bang"></tbody>
</table>

<script>
const API = "https://script.google.com/macros/s/AKfycbwj8PUcd0vq4LeLlZ5SCxLzQbV2lbfDFnq6ZWuqZ-JEcgbMskbyEzMPLK0Ub8qdJO_ljg/exec";

let data = [];

// format ngày chuẩn dd/mm/yyyy
function formatDate(d){
  if(!d) return "";
  let x = new Date(d);
  if(isNaN(x)) return "";

  let day = ("0"+x.getDate()).slice(-2);
  let month = ("0"+(x.getMonth()+1)).slice(-2);
  let year = x.getFullYear();

  return `${day}/${month}/${year}`;
}

// load dữ liệu
async function load(){
  let res = await fetch(API);
  data = await res.json();
  render();
}

// hiển thị
function render(){
  let tim = document.getElementById("tim").value.toLowerCase();
  let loc = document.getElementById("locNha").value;

  let html = "";
  let stt = 1;

  data.forEach((r,i)=>{

    if(tim && !r.hoten.toLowerCase().includes(tim)) return;
    if(loc && r.nha != loc) return;

    html += `
    <tr>
      <td>${stt++}</td>
      <td><input value="${r.hoten}" id="ht${i}"></td>
      <td><input value="${r.namsinh}" id="ns${i}"></td>
      <td><input value="${r.nha}" id="nha${i}"></td>
      <td>
        <input type="date" id="ngay${i}" value="${r.ngay || ""}">
      </td>
      <td><input value="${r.thuoc}" id="thuoc${i}"></td>
      <td><button onclick="luu(${i})">💾</button></td>
      <td><button onclick="xoa(${i})">❌</button></td>
    </tr>`;
  });

  document.getElementById("bang").innerHTML = html;
}

// thêm
async function them(){
  let obj = {
    hoten: hoten.value,
    namsinh: namsinh.value,
    nha: nha.value,
    thuoc: thuoc.value,
    ngay: ngay.value
  };

  await fetch(API,{
    method:"POST",
    body: JSON.stringify(obj)
  });

  // reset
  hoten.value="";
  namsinh.value="";
  nha.value="";
  thuoc.value="";
  ngay.value="";
  hoten.focus();

  load();
}

// lưu chỉnh sửa
async function luu(i){
  let obj = {
    index: i,
    hoten: document.getElementById("ht"+i).value,
    namsinh: document.getElementById("ns"+i).value,
    nha: document.getElementById("nha"+i).value,
    thuoc: document.getElementById("thuoc"+i).value,
    ngay: document.getElementById("ngay"+i).value
  };

  await fetch(API,{
    method:"POST",
    body: JSON.stringify(obj)
  });

  load();
}

// xóa (FIX CHUẨN)
async function xoa(i){
  if(!confirm("Xóa dòng này?")) return;

  await fetch(API,{
    method:"POST",
    body: JSON.stringify({
      action:"delete",
      index:i
    })
  });

  load();
}

// checkbox nhà
function taoChonNha(){
  let html="";
  for(let i=1;i<=9;i++){
    html += `<label><input type="checkbox" value="${i}"> ${i}</label> `;
  }
  document.getElementById("chonNha").innerHTML = html;
}

// in
function inDanhSach(){
  let checked = document.querySelectorAll("#chonNha input:checked");
  let arr = [...checked].map(x=>x.value);

  let html = "<h3>Danh sách</h3><table border=1><tr><th>STT</th><th>Họ tên</th><th>Năm sinh</th><th>Nhà</th><th>Ngày</th></tr>";

  let stt=1;

  data.forEach(r=>{
    if(arr.length && !arr.includes(r.nha)) return;

    html += `<tr>
      <td>${stt++}</td>
      <td>${r.hoten}</td>
      <td>${r.namsinh}</td>
      <td>${r.nha}</td>
      <td>${formatDate(r.ngay)}</td>
    </tr>`;
  });

  html += "</table>";

  let w = window.open("");
  w.document.write(html);
  w.print();
}

taoChonNha();
load();
</script>

</body>
</html>
