<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>DANH SÁCH UỐNG THUỐC</title>

<style>
body { font-family: Arial; padding: 20px; background: #f5f6fa; }
h2 { text-align: center; }

input, select {
  padding: 6px;
  margin: 5px;
}

button {
  padding: 6px 12px;
  cursor: pointer;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 15px;
}

th {
  background: #1e73be;
  color: white;
  padding: 8px;
}

td {
  border: 1px solid #ccc;
  padding: 6px;
  text-align: center;
}

input[type="text"], input[type="number"] {
  width: 90%;
}

input[type="date"] {
  width: 150px;
}
</style>
</head>

<body>

<h2>DANH SÁCH UỐNG THUỐC</h2>

<!-- FORM -->
<input id="hoten" placeholder="Họ tên">
<input id="namsinh" placeholder="Năm sinh">
<input id="nha" placeholder="Nhà">
<input id="thuoc" placeholder="Thuốc">
<input id="ngay" type="date">

<button onclick="them()">Thêm</button>
<button onclick="inDanhSach()">🖨 In</button>

<br>

<input id="search" placeholder="🔍 Tìm tên..." onkeyup="loc()">

<select id="locnha" onchange="loc()">
  <option value="">🏠 Lọc theo nhà</option>
  <option>1</option><option>2</option><option>3</option>
  <option>4</option><option>5</option><option>6</option>
  <option>7</option><option>8</option><option>9</option>
</select>

<br>

<b>Chọn nhà để in:</b><br>
<div id="chonNha"></div>

<table>
<thead>
<tr>
<th>STT</th>
<th>Họ tên</th>
<th>Năm sinh</th>
<th>Nhà</th>
<th>Ngày tái khám</th>
<th>Thuốc</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>

<script>
const API = "https://script.google.com/macros/s/AKfycbwj8PUcd0vq4LeLlZ5SCxLzQbV2lbfDFnq6ZWuqZ-JEcgbMskbyEzMPLK0Ub8qdJO_ljg/exec";

let rawData = [];

// format ngày chuẩn
function formatDate(d) {
  if (!d) return "";
  const date = new Date(d);
  return date.toISOString().split("T")[0];
}

// load dữ liệu
async function load() {
  const res = await fetch(API);
  rawData = await res.json();
  render(rawData);
}

// hiển thị bảng
function render(data) {
  let html = "";

  data.forEach((row, i) => {

    const hoten = row.hoten;
    const namsinh = row.namsinh;
    const nha = row.nha;
    const thuoc = row.thuoc;
    const ngay = row.ngaytaikham;

    html += `
      <tr>
        <td>${i+1}</td>
        <td><input value="${hoten}"></td>
        <td><input value="${namsinh}"></td>
        <td><input value="${nha}"></td>
        <td><input type="date" value="${formatDate(ngay)}"></td>
        <td><input value="${thuoc}"></td>
      </tr>
    `;
  });

  document.getElementById("data").innerHTML = html;
}

// thêm dữ liệu
async function them() {
  const hoten = document.getElementById("hoten").value;
  const namsinh = document.getElementById("namsinh").value;
  const nha = document.getElementById("nha").value;
  const thuoc = document.getElementById("thuoc").value;
  const ngay = document.getElementById("ngay").value;

  await fetch(API, {
    method: "POST",
    body: JSON.stringify({ hoten, namsinh, nha, thuoc, ngay })
  });

  // reset form
  document.getElementById("hoten").value = "";
  document.getElementById("namsinh").value = "";
  document.getElementById("nha").value = "";
  document.getElementById("thuoc").value = "";
  document.getElementById("ngay").value = "";

  load();
}

// tìm + lọc
function loc() {
  const s = document.getElementById("search").value.toLowerCase();
  const nha = document.getElementById("locnha").value;

  const filtered = rawData.filter(r =>
    r.hoten.toLowerCase().includes(s) &&
    (nha === "" || r.nha == nha)
  );

  render(filtered);
}

// tạo checkbox nhà
function taoCheck() {
  let html = "";
  for (let i = 1; i <= 9; i++) {
    html += `<label><input type="checkbox" value="${i}"> ${i}</label> `;
  }
  document.getElementById("chonNha").innerHTML = html;
}

// in danh sách
function inDanhSach() {
  const checked = [...document.querySelectorAll("#chonNha input:checked")].map(c=>c.value);

  const data = rawData.filter(r =>
    checked.length === 0 || checked.includes(String(r.nha))
  );

  let html = "<h3>DANH SÁCH TÁI KHÁM</h3><table border=1><tr><th>STT</th><th>Họ tên</th><th>Năm sinh</th><th>Nhà</th><th>Ngày tái khám</th></tr>";

  data.forEach((r,i)=>{
    html += `<tr>
      <td>${i+1}</td>
      <td>${r.hoten}</td>
      <td>${r.namsinh}</td>
      <td>${r.nha}</td>
      <td>${formatDate(r.ngaytaikham)}</td>
    </tr>`;
  });

  html += "</table>";

  const w = window.open("");
  w.document.write(html);
  w.print();
}

taoCheck();
load();
</script>

</body>
</html>
