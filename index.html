<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<title>DANH SÁCH UỐNG THUỐC</title>

<style>
body{font-family:Arial;padding:20px}
h2{text-align:center}

input,select,button{padding:6px;margin:5px}

table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border:1px solid #ccc;padding:6px;text-align:center}
th{background:#2f6ea3;color:white}
</style>

</head>

<body>

<h2>DANH SÁCH UỐNG THUỐC</h2>

<input id="hoten" placeholder="Họ tên">
<input id="namsinh" placeholder="Năm sinh">
<input id="nha" placeholder="Nhà">
<input id="thuoc" placeholder="Thuốc">
<input type="date" id="ngay">

<button onclick="them()">Thêm</button>

<select id="locNha" onchange="load()">
  <option value="">Tất cả nhà</option>
  <option>1</option><option>2</option><option>3</option>
  <option>4</option><option>5</option><option>6</option>
  <option>7</option><option>8</option><option>9</option>
</select>

<button onclick="inDanhSach()">🖨 In</button>

<table>
<thead>
<tr>
<th>STT</th>
<th>Họ tên</th>
<th>Năm sinh</th>
<th>Nhà</th>
<th>Ngày tái khám</th>
<th>Thuốc</th>
</tr>
</thead>
<tbody id="bang"></tbody>
</table>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDpuS7LUymdqr--QKtg1zmQpUEH2osuPj4",
  authDomain: "thuoctamthan-df187.firebaseapp.com",
  projectId: "thuoctamthan-df187",
  storageBucket: "thuoctamthan-df187.firebasestorage.app",
  messagingSenderId: "796983672732",
  appId: "1:796983672732:web:bb34f8b0e15b0981455259"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// LOAD
async function load() {
  const loc = document.getElementById("locNha").value;
  const querySnapshot = await getDocs(collection(db, "benhnhan"));

  let html = "";
  let stt = 1;

  querySnapshot.forEach((doc) => {
    const r = doc.data();

    if (loc && r.nha != loc) return;

    html += `
      <tr>
        <td>${stt++}</td>
        <td>${r.hoten||""}</td>
        <td>${r.namsinh||""}</td>
        <td>${r.nha||""}</td>
        <td>${r.ngaytaikham||""}</td>
        <td>${r.thuoc||""}</td>
      </tr>
    `;
  });

  document.getElementById("bang").innerHTML = html;
}

// ADD
window.them = async function () {
  await addDoc(collection(db, "benhnhan"), {
    hoten: document.getElementById("hoten").value,
    namsinh: document.getElementById("namsinh").value,
    nha: document.getElementById("nha").value,
    thuoc: document.getElementById("thuoc").value,
    ngaytaikham: document.getElementById("ngay").value
  });

  alert("Đã lưu!");
  load();
};

// IN (chỉ 4 cột)
window.inDanhSach = function () {
  const rows = document.querySelectorAll("#bang tr");

  let html = `
  <h2 style="text-align:center">DANH SÁCH UỐNG THUỐC</h2>
  <table border="1" style="width:100%;border-collapse:collapse">
  <tr>
  <th>STT</th>
  <th>Họ tên</th>
  <th>Năm sinh</th>
  <th>Ngày tái khám</th>
  </tr>
  `;

  rows.forEach(tr=>{
    const td = tr.querySelectorAll("td");

    html += `
    <tr>
    <td>${td[0].innerText}</td>
    <td>${td[1].innerText}</td>
    <td>${td[2].innerText}</td>
    <td>${td[4].innerText}</td>
    </tr>
    `;
  });

  html += "</table>";

  let win = window.open("");
  win.document.write(html);
  win.print();
};

load();
</script>

</body>
</html>
