<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>DANH SÁCH UỐNG THUỐC</title>

<style>
body{font-family:Arial;text-align:center}
input,select,button{padding:6px;margin:4px}
table{width:100%;border-collapse:collapse;margin-top:10px}
th{background:#2f6fa3;color:#fff;padding:8px}
td{border:1px solid #ccc;padding:6px}
button{cursor:pointer}
</style>
</head>

<body>

<h2>DANH SÁCH UỐNG THUỐC</h2>

<!-- FORM -->
<input id="hoten" placeholder="Họ tên">
<input id="namsinh" placeholder="Năm sinh">
<input id="nha" placeholder="Nhà (1-9)">
<input id="thuoc" placeholder="Thuốc">
<input type="date" id="ngay">

<button onclick="them()">➕ Thêm</button>

<br>

<!-- TÌM + LỌC -->
<input id="timten" placeholder="🔍 Tìm tên..." onkeyup="load()">

<select id="locNha" onchange="load()">
<option value="">🏠 Tất cả nhà</option>
<option value="1">Nhà 1</option>
<option value="2">Nhà 2</option>
<option value="3">Nhà 3</option>
<option value="4">Nhà 4</option>
<option value="5">Nhà 5</option>
<option value="6">Nhà 6</option>
<option value="7">Nhà 7</option>
<option value="8">Nhà 8</option>
<option value="9">Nhà 9</option>
</select>

<button onclick="inDanhSach()">🖨 In</button>

<table>
<thead>
<tr>
<th>STT</th>
<th>Họ tên</th>
<th>Năm sinh</th>
<th>Nhà</th>
<th>Ngày tái khám</th>
<th>Thuốc</th>
<th>Sửa</th>
<th>Xóa</th>
</tr>
</thead>

<tbody id="bang"></tbody>
</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getFirestore, collection, addDoc, getDocs,
deleteDoc, doc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSy...",
authDomain: "thuoctamthan-df187.firebaseapp.com",
projectId: "thuoctamthan-df187",
storageBucket: "thuoctamthan-df187.appspot.com",
messagingSenderId: "796983672732",
appId: "1:796983672732:web:xxx"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let data = [];


// LOAD DATA
async function load(){
const snap = await getDocs(collection(db,"benhnhan"));
data=[];
snap.forEach(d=>{
data.push({id:d.id,...d.data()});
});
render();
}


// RENDER
function render(){
let html="";
let stt=1;

let tim = document.getElementById("timten").value.toLowerCase();
let locNha = document.getElementById("locNha").value;

data.forEach(r=>{

if(tim && !r.hoten?.toLowerCase().includes(tim)) return;

// FIX LỌC NHÀ
if(locNha && String(r.nha).trim() != String(locNha).trim()) return;

html+=`
<tr>
<td>${stt++}</td>
<td><input value="${r.hoten||""}" id="ten${r.id}"></td>
<td><input value="${r.namsinh||""}" id="ns${r.id}"></td>
<td><input value="${r.nha||""}" id="nha${r.id}"></td>
<td><input type="date" value="${r.ngaytaikham||""}" id="ngay${r.id}"></td>
<td><input value="${r.thuoc||""}" id="thuoc${r.id}"></td>
<td><button onclick="sua('${r.id}')">💾</button></td>
<td><button onclick="xoa('${r.id}')">❌</button></td>
</tr>
`;
});

document.getElementById("bang").innerHTML=html;
}


// THÊM
async function them(){
let hoten = document.getElementById("hoten").value.trim();
let namsinh = document.getElementById("namsinh").value.trim();
let nha = document.getElementById("nha").value.trim();
let thuoc = document.getElementById("thuoc").value.trim();
let ngay = document.getElementById("ngay").value;

if(!hoten){ alert("Nhập họ tên"); return;}

await addDoc(collection(db,"benhnhan"),{
hoten,namsinh,nha,thuoc,ngaytaikham:ngay
});

load();
}


// SỬA
async function sua(id){
let hoten = document.getElementById("ten"+id).value;
let namsinh = document.getElementById("ns"+id).value;
let nha = document.getElementById("nha"+id).value;
let thuoc = document.getElementById("thuoc"+id).value;
let ngay = document.getElementById("ngay"+id).value;

await updateDoc(doc(db,"benhnhan",id),{
hoten,namsinh,nha,thuoc,ngaytaikham:ngay
});

alert("Đã lưu");
load();
}


// XOÁ
async function xoa(id){
if(!confirm("Xóa?")) return;
await deleteDoc(doc(db,"benhnhan",id));
load();
}


// IN
function inDanhSach(){

let locNha = document.getElementById("locNha").value;
let tim = document.getElementById("timten").value.toLowerCase();

let html=`
<h3 style="text-align:center">DANH SÁCH UỐNG THUỐC</h3>
<table border="1" style="width:100%;border-collapse:collapse;text-align:center">
<tr>
<th>STT</th>
<th>Họ tên</th>
<th>Năm sinh</th>
<th>Nhà</th>
<th>Ngày tái khám</th>
</tr>
`;

let stt=1;

data.forEach(r=>{

if(tim && !r.hoten?.toLowerCase().includes(tim)) return;
if(locNha && String(r.nha).trim() != String(locNha).trim()) return;

html+=`
<tr>
<td>${stt++}</td>
<td>${r.hoten||""}</td>
<td>${r.namsinh||""}</td>
<td>${r.nha||""}</td>
<td>${r.ngaytaikham||""}</td>
</tr>
`;
});

html+="</table>";

let w=window.open("");
w.document.write(html);
w.print();
}


load();

</script>

</body>
</html>
