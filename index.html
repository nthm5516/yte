<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Danh sách uống thuốc</title>

<style>
body { font-family: Arial; padding:10px; background:#f5f6fa; }
h2 { text-align:center; }

input, select {
    width:140px;
    padding:6px;
    margin:3px;
}

table {
    width:100%;
    border-collapse:collapse;
    background:white;
    margin-top:10px;
}

th, td {
    border:1px solid #ccc;
    padding:6px;
    text-align:center;
}

th {
    background:#0984e3;
    color:white;
}

.ten { text-align:left; }

button { padding:5px 10px; margin:2px; }
</style>
</head>

<body>

<h2>DANH SÁCH UỐNG THUỐC</h2>

<!-- FORM -->
<div>
<input id="hoten" placeholder="Họ tên">
<input id="namsinh" placeholder="Năm sinh">
<input id="nha" placeholder="Nhà">
<input id="thuoc" placeholder="Thuốc">
<input type="date" id="ngaytaikham">

<button onclick="them()">Thêm</button>
<button onclick="inDanhSach()">🖨️ In</button>
</div>

<br>

<!-- TÌM -->
<input id="timten" placeholder="🔍 Tìm tên..." onkeyup="timTen()">

<!-- LỌC NHÀ -->
<select id="locnha" onchange="locNha()">
<option value="">🏠 Lọc theo nhà</option>
<option value="1">Nhà 1</option>
<option value="2">Nhà 2</option>
<option value="3">Nhà 3</option>
<option value="4">Nhà 4</option>
<option value="5">Nhà 5</option>
<option value="6">Nhà 6</option>
<option value="7">Nhà 7</option>
<option value="8">Nhà 8</option>
<option value="9">Nhà 9</option>
</select>

<!-- TABLE -->
<table id="bang"></table>

<script>

const API = "https://script.google.com/macros/s/AKfycbyEeRLmbkYYHkN0_tkhAUWsgW-cRIXkoARpFzsN9BtQZoVtqw6EYFLXf5-V7qoFh0zNoQ/exec";


// ===== THÊM =====
function them(){
    fetch(API,{
        method:"POST",
        body:JSON.stringify({
            hoten:hoten.value,
            namsinh:namsinh.value,
            nha:nha.value,
            thuoc:thuoc.value,
            ngaytaikham:ngaytaikham.value
        })
    }).then(()=>{ clearForm(); load(); });
}


// ===== LOAD =====
function load(){
    fetch(API)
    .then(res=>res.json())
    .then(data=>{
        let html = `
        <tr>
        <th>STT</th>
        <th>Họ tên</th>
        <th>Năm sinh</th>
        <th>Nhà</th>
        <th>Ngày tái khám</th>
        <th>Thuốc</th>
        <th>Sửa</th>
        <th>Xóa</th>
        </tr>
        `;

        data.forEach((r,i)=>{
            html += `
            <tr>
            <td>${i+1}</td>
            <td class="ten"><input id="hoten_${i}" value="${r.hoten}"></td>
            <td><input id="namsinh_${i}" value="${r.namsinh}"></td>
            <td><input id="nha_${i}" value="${r.nha}"></td>
            <td><input type="date" id="ngay_${i}" value="${r.ngaytaikham}"></td>
            <td><input id="thuoc_${i}" value="${r.thuoc}"></td>
            <td><button onclick="sua(${i})">💾</button></td>
            <td><button onclick="xoa(${i})">❌</button></td>
            </tr>
            `;
        });

        bang.innerHTML = html;
    });
}


// ===== SỬA =====
function sua(i){
    fetch(API,{
        method:"POST",
        body:JSON.stringify({
            index:i,
            hoten:document.getElementById("hoten_"+i).value,
            namsinh:document.getElementById("namsinh_"+i).value,
            nha:document.getElementById("nha_"+i).value,
            thuoc:document.getElementById("thuoc_"+i).value,
            ngaytaikham:document.getElementById("ngay_"+i).value
        })
    }).then(()=>load());
}


// ===== XÓA =====
function xoa(i){
    fetch(API,{
        method:"POST",
        body:JSON.stringify({delete:i})
    }).then(()=>load());
}


// ===== TÌM =====
function timTen(){
    let key = timten.value.toLowerCase();
    let rows = bang.querySelectorAll("tr");

    rows.forEach((r,i)=>{
        if(i==0) return;
        let ten = r.cells[1].querySelector("input").value.toLowerCase();
        r.style.display = ten.includes(key) ? "" : "none";
    });
}


// ===== LỌC NHÀ =====
function locNha(){
    let nha = locnha.value;
    let rows = bang.querySelectorAll("tr");

    rows.forEach((r,i)=>{
        if(i==0) return;
        let nharow = r.cells[3].querySelector("input").value;
        r.style.display = (!nha || nharow==nha) ? "" : "none";
    });
}


// ===== IN =====
function inDanhSach(){
    let rows = document.querySelectorAll("#bang tr");

    let html = `
    <h2 style="text-align:center;">DANH SÁCH UỐNG THUỐC</h2>
    <table border="1" style="width:100%; border-collapse:collapse;">
    <tr>
        <th>STT</th>
        <th>Họ tên</th>
        <th>Năm sinh</th>
        <th>Nhà</th>
        <th>Ngày tái khám</th>
    </tr>
    `;

    rows.forEach((r,i)=>{
        if(i==0) return;

        let stt=i;
        let ten=r.cells[1].querySelector("input").value;
        let ns=r.cells[2].querySelector("input").value;
        let nha=r.cells[3].querySelector("input").value;
        let ngay=r.cells[4].querySelector("input").value;

        html+=`<tr>
        <td>${stt}</td>
        <td>${ten}</td>
        <td>${ns}</td>
        <td>${nha}</td>
        <td>${ngay}</td>
        </tr>`;
    });

    html+="</table>";

    let w=window.open("");
    w.document.write(html);
    w.print();
}


// ===== CLEAR =====
function clearForm(){
    hoten.value="";
    namsinh.value="";
    nha.value="";
    thuoc.value="";
    ngaytaikham.value="";
}

load();

</script>

</body>
</html>
