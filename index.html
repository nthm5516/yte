<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>DANH SÁCH UỐNG THUỐC</title>

<style>
body{font-family:Arial;background:#f5f6fa;padding:20px}
h2{text-align:center}
input,button{padding:8px;margin:5px}
table{width:100%;border-collapse:collapse;margin-top:10px}
th{background:#2e75b6;color:white;padding:10px}
td{border:1px solid #ccc;padding:5px;text-align:center}
</style>

</head>

<body>

<h2>DANH SÁCH UỐNG THUỐC</h2>

<input id="hoten" placeholder="Họ tên">
<input id="namsinh" placeholder="Năm sinh">
<input id="nha" placeholder="Nhà">
<input id="thuoc" placeholder="Thuốc">
<input id="ngay" type="date">

<button onclick="them()">Thêm</button>

<table>
<thead>
<tr>
<th>STT</th>
<th>Họ tên</th>
<th>Năm sinh</th>
<th>Nhà</th>
<th>Ngày tái khám</th>
<th>Thuốc</th>
<th>Sửa</th>
<th>Xóa</th>
</tr>
</thead>
<tbody id="bang"></tbody>
</table>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDpuS7LUymdqr--QKtg1zmQpUEH2osuPj4",
  authDomain: "thuoctamthan-df187.firebaseapp.com",
  projectId: "thuoctamthan-df187",
  storageBucket: "thuoctamthan-df187.firebasestorage.app",
  messagingSenderId: "796983672732",
  appId: "1:796983672732:web:bb34f8b0e15b0981455259"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let data = [];

// LOAD DATA
async function load(){
  const snap = await getDocs(collection(db, "benhnhan"));
  data = [];
  snap.forEach(d => data.push({ id: d.id, ...d.data() }));
  render();
}

// THÊM
window.them = async function(){
  await addDoc(collection(db, "benhnhan"), {
    hoten: hoten.value,
    namsinh: namsinh.value,
    nha: nha.value,
    thuoc: thuoc.value,
    ngaytaikham: ngay.value
  });

  hoten.value="";
  namsinh.value="";
  nha.value="";
  thuoc.value="";
  ngay.value="";

  load();
};

// SỬA
window.luu = async function(i){
  await updateDoc(doc(db,"benhnhan",data[i].id),{
    hoten: document.getElementById("ht"+i).value,
    namsinh: document.getElementById("ns"+i).value,
    nha: document.getElementById("nha"+i).value,
    thuoc: document.getElementById("thuoc"+i).value,
    ngaytaikham: document.getElementById("ngay"+i).value
  });
  load();
};

// XÓA
window.xoa = async function(i){
  if(!confirm("Xóa dòng này?")) return;
  await deleteDoc(doc(db,"benhnhan",data[i].id));
  load();
};

// HIỂN THỊ
function render(){
  let html="";
  let stt=1;

  data.forEach((r,i)=>{
    html += `
    <tr>
      <td>${stt++}</td>
      <td><input value="${r.hoten||""}" id="ht${i}"></td>
      <td><input value="${r.namsinh||""}" id="ns${i}"></td>
      <td><input value="${r.nha||""}" id="nha${i}"></td>
      <td><input type="date" value="${r.ngaytaikham||""}" id="ngay${i}"></td>
      <td><input value="${r.thuoc||""}" id="thuoc${i}"></td>
      <td><button onclick="luu(${i})">💾</button></td>
      <td><button onclick="xoa(${i})">❌</button></td>
    </tr>`;
  });

  document.getElementById("bang").innerHTML = html;
}

load();
</script>

</body>
</html>
