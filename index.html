<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<title>DANH SÁCH UỐNG THUỐC</title>

<style>
body{font-family:Arial;padding:20px}
h2{text-align:center}

input,select,button{
  padding:6px;
  margin:5px;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th,td{
  border:1px solid #ccc;
  padding:6px;
  text-align:center;
}

th{
  background:#2f6ea3;
  color:white;
}
</style>

</head>

<body>

<h2>DANH SÁCH UỐNG THUỐC</h2>

<!-- INPUT -->

<input id="hoten" placeholder="Họ tên">
<input id="namsinh" placeholder="Năm sinh">
<input id="nha" placeholder="Nhà (1-9)">
<input id="thuoc" placeholder="Thuốc">
<input type="date" id="ngay">

<button onclick="them()">Thêm</button>

<br>

<input id="timten" placeholder="🔍 Tìm tên..." onkeyup="load()">

<select id="locNha" onchange="load()">
  <option value="">Tất cả nhà</option>
  <option>1</option><option>2</option><option>3</option>
  <option>4</option><option>5</option><option>6</option>
  <option>7</option><option>8</option><option>9</option>
</select>

<button onclick="inDanhSach()">🖨 In</button>

<!-- TABLE -->

<table>
<thead>
<tr>
<th>STT</th>
<th>Họ tên</th>
<th>Năm sinh</th>
<th>Nhà</th>
<th>Ngày tái khám</th>
<th>Thuốc</th>
</tr>
</thead>

<tbody id="bang"></tbody>
</table>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyDpuS7LUymdqr--QKtg1zmQpUEH2osuPj4",
  authDomain: "thuoctamthan-df187.firebaseapp.com",
  projectId: "thuoctamthan-df187",
  storageBucket: "thuoctamthan-df187.firebasestorage.app",
  messagingSenderId: "796983672732",
  appId: "1:796983672732:web:bb34f8b0e15b0981455259"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// LOAD DATA
async function load() {
  const locNha = document.getElementById("locNha").value;
  const tim = document.getElementById("timten").value.toLowerCase();

  const querySnapshot = await getDocs(collection(db, "benhnhan"));

  let html = "";
  let stt = 1;

  querySnapshot.forEach((doc) => {
    const r = doc.data();

    if (locNha && r.nha != locNha) return;
    if (tim && !r.hoten.toLowerCase().includes(tim)) return;

    html += `
      <tr>
        <td>${stt++}</td>
        <td>${r.hoten||""}</td>
        <td>${r.namsinh||""}</td>
        <td>${r.nha||""}</td>
        <td>${r.ngaytaikham||""}</td>
        <td>${r.thuoc||""}</td>
      </tr>
    `;
  });

  document.getElementById("bang").innerHTML = html;
}

// ADD DATA
window.them = async function () {
  await addDoc(collection(db, "benhnhan"), {
    hoten: document.getElementById("hoten").value,
    namsinh: document.getElementById("namsinh").value,
    nha: document.getElementById("nha").value,
    thuoc: document.getElementById("thuoc").value,
    ngaytaikham: document.getElementById("ngay").value
  });

  alert("Đã lưu!");
  load();
};

// IN
window.inDanhSach = function () {
  const locNha = document.getElementById("locNha").value;
  const rows = document.querySelectorAll("#bang tr");

  let html = `
  <h2 style="text-align:center">
    DANH SÁCH UỐNG THUỐC ${locNha ? "(Nhà " + locNha + ")" : ""}
  </h2>

  <table border="1" style="width:100%;border-collapse:collapse">
    <tr>
      <th>STT</th>
      <th>Họ tên</th>
      <th>Năm sinh</th>
      <th>Nhà</th>
      <th>Ngày tái khám</th>
    </tr>
  `;

  rows.forEach(tr=>{
    const td = tr.querySelectorAll("td");

    if(td.length>0){
      html += `
      <tr>
        <td>${td[0].innerText}</td>
        <td style="text-align:left;padding-left:10px">${td[1].innerText}</td>
        <td>${td[2].innerText}</td>
        <td>${td[3].innerText}</td>
        <td>${td[4].innerText}</td>
      </tr>
      `;
    }
  });

  html += "</table>";

  let win = window.open("");
  win.document.write(`
    <html>
    <head>
      <title>In</title>
      <style>
        body{font-family:Arial;padding:20px}
        table{width:100%;border-collapse:collapse}
        th,td{border:1px solid #000;padding:8px;text-align:center}
        th{background:#ddd}
      </style>

```
</head>
<body>${html}</body>
</html>
```

`);

win.document.close();
win.print();
};

// chạy khi mở
load(); </script>

</body>
</html>
