<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>DANH SÁCH UỐNG THUỐC</title>

<style>
body { font-family: Arial; padding: 20px; background: #f5f6fa; }
h2 { text-align: center; }

input, select {
  padding: 6px;
  margin: 5px;
}

button {
  padding: 6px 10px;
  cursor: pointer;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 15px;
}

th {
  background: #1e73be;
  color: white;
  padding: 8px;
}

td {
  border: 1px solid #ccc;
  padding: 6px;
  text-align: center;
}

.btn {
  cursor: pointer;
  padding: 5px 8px;
  border: none;
}

.btn-save { background: #6c5ce7; color: white; }
.btn-del { background: #ff4757; color: white; }

</style>
</head>

<body>

<h2>DANH SÁCH UỐNG THUỐC</h2>

<input id="hoten" placeholder="Họ tên">
<input id="namsinh" placeholder="Năm sinh">
<input id="nha" placeholder="Nhà">
<input id="thuoc" placeholder="Thuốc">
<input id="ngay" type="date">

<button onclick="them()">Thêm</button>
<button onclick="inDanhSach()">🖨 In</button>

<br>

<input id="search" placeholder="🔍 Tìm tên..." onkeyup="loc()">

<select id="locnha" onchange="loc()">
<option value="">🏠 Lọc theo nhà</option>
<option>1</option><option>2</option><option>3</option>
<option>4</option><option>5</option><option>6</option>
<option>7</option><option>8</option><option>9</option>
</select>

<br>

<b>Chọn nhà để in:</b><br>
<div id="chonNha"></div>

<table>
<thead>
<tr>
<th>STT</th>
<th>Họ tên</th>
<th>Năm sinh</th>
<th>Nhà</th>
<th>Ngày tái khám</th>
<th>Thuốc</th>
<th>Sửa</th>
<th>Xóa</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>

<script>
const API = "https://script.google.com/macros/s/AKfycbwj8PUcd0vq4LeLlZ5SCxLzQbV2lbfDFnq6ZWuqZ-JEcgbMskbyEzMPLK0Ub8qdJO_ljg/exec";
let rawData = [];

// format yyyy-mm-dd (cho input)
function formatDateInput(d){
  if (!d) return "";
  return new Date(d).toISOString().split("T")[0];
}

// format dd/mm/yyyy (hiển thị)
function formatDateVN(d){
  if (!d) return "";
  const date = new Date(d);
  return date.toLocaleDateString("vi-VN");
}

// load
async function load(){
  const res = await fetch(API);
  rawData = await res.json();
  render(rawData);
}

// render
function render(data){
  let html = "";

  data.forEach((r,i)=>{
    html += `
    <tr>
      <td>${i+1}</td>
      <td><input id="ten${i}" value="${r.hoten}"></td>
      <td><input id="ns${i}" value="${r.namsinh}"></td>
      <td><input id="nha${i}" value="${r.nha}"></td>
      <td>
        <input type="date" id="ngay${i}" value="${formatDateInput(r.ngaytaikham)}">
        <div style="font-size:12px;color:gray">${formatDateVN(r.ngaytaikham)}</div>
      </td>
      <td><input id="thuoc${i}" value="${r.thuoc}"></td>
      <td><button class="btn btn-save" onclick="sua(${i})">💾</button></td>
      <td><button class="btn btn-del" onclick="xoa(${i})">❌</button></td>
    </tr>`;
  });

  document.getElementById("data").innerHTML = html;
}

// thêm
async function them(){
  const data = {
    hoten: hoten.value,
    namsinh: namsinh.value,
    nha: nha.value,
    thuoc: thuoc.value,
    ngay: ngay.value
  };

  await fetch(API,{method:"POST",body:JSON.stringify(data)});
  load();
}

// sửa
async function sua(i){
  const data = {
    hoten: document.getElementById("ten"+i).value,
    namsinh: document.getElementById("ns"+i).value,
    nha: document.getElementById("nha"+i).value,
    thuoc: document.getElementById("thuoc"+i).value,
    ngay: document.getElementById("ngay"+i).value,
    index: i
  };

  await fetch(API,{
    method:"PUT",
    body: JSON.stringify(data)
  });

  load();
}

// xóa
async function xoa(i){
  if(!confirm("Xóa dòng này?")) return;

  await fetch(API,{
    method:"DELETE",
    body: JSON.stringify({index:i})
  });

  load();
}

// lọc
function loc(){
  const s = search.value.toLowerCase();
  const n = locnha.value;

  const f = rawData.filter(r =>
    r.hoten.toLowerCase().includes(s) &&
    (n=="" || r.nha==n)
  );

  render(f);
}

// checkbox
function taoCheck(){
  let html="";
  for(let i=1;i<=9;i++){
    html+=`<label><input type="checkbox" value="${i}"> ${i}</label> `;
  }
  chonNha.innerHTML=html;
}

// in
function inDanhSach(){
  const checked=[...document.querySelectorAll("#chonNha input:checked")].map(c=>c.value);

  const data=rawData.filter(r=>checked.length==0||checked.includes(String(r.nha)));

  let html="<h3>DANH SÁCH</h3><table border=1><tr><th>STT</th><th>Họ tên</th><th>Năm sinh</th><th>Nhà</th><th>Ngày tái khám</th></tr>";

  data.forEach((r,i)=>{
    html+=`<tr>
    <td>${i+1}</td>
    <td>${r.hoten}</td>
    <td>${r.namsinh}</td>
    <td>${r.nha}</td>
    <td>${formatDateVN(r.ngaytaikham)}</td>
    </tr>`;
  });

  html+="</table>";

  const w=window.open("");
  w.document.write(html);
  w.print();
}

taoCheck();
load();
</script>

</body>
</html>
